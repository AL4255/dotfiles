# Set prefix to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix  

# Enable mouse support
set -g mouse off


# Set 256 colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Display tmux messages for 4 seconds
set -g display-time 4000

# Refresh status bar every 5 seconds
set -g status-interval 5

# Enable focus events
set -g focus-events on

# Vi mode
set -g mode-keys vi
set -g status-keys vi

# Better split pane keybindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Copy mode vim keybindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Quick window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Catppuccin Mocha Theme
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_cyan="#89dceb"
thm_black="#181825"
thm_gray="#313244"
thm_magenta="#cba6f7"
thm_pink="#f5c2e7"
thm_red="#f38ba8"
thm_green="#a6e3a1"
thm_yellow="#f9e2af"
thm_blue="#89b4fa"
thm_orange="#fab387"
thm_black4="#585b70"

# Status bar
set -g status-position bottom
set -g status-style "bg=${thm_bg},fg=${thm_fg}"
set -g status-left-length 100
set -g status-right-length 100

# Left status
set -g status-left "#[fg=${thm_bg},bg=${thm_blue},bold] #S #[fg=${thm_blue},bg=${thm_bg}]"

# Right status
set -g status-right "#[fg=${thm_gray}]#[fg=${thm_fg},bg=${thm_gray}] %Y-%m-%d #[fg=${thm_blue}]#[fg=${thm_bg},bg=${thm_blue},bold] %H:%M "

# Window status
setw -g window-status-format "#[fg=${thm_fg},bg=${thm_bg}] #I #W "
setw -g window-status-current-format "#[fg=${thm_bg},bg=${thm_magenta},bold] #I #W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Message style
set -g message-style "bg=${thm_orange},fg=${thm_bg}"
set -g message-command-style "bg=${thm_orange},fg=${thm_bg}"

# Pane number display
set -g display-panes-active-colour "${thm_blue}"
set -g display-panes-colour "${thm_yellow}"

# Clock mode
setw -g clock-mode-colour "${thm_blue}"
set -g mouse on
set -g set-clipboard on
set -g mouse on
set -g get-clipboard
