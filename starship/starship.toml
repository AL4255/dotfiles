# Starship Configuration - Minimal Catppuccin Mocha

format = """
[](surface0)\
$directory\
[](bg:peach fg:surface0)\
$git_branch\
$git_status\
[](fg:peach bg:green)\
$nodejs\
$python\
$rust\
$golang\
$java\
[ ](fg:green)\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[➜](bold red)'

[directory]
style = "fg:blue bg:surface0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"projects" = " "
".config" = " "

[git_branch]
symbol = ""
style = "bg:peach fg:base"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:peach fg:base"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
symbol = ""
style = "bg:green fg:base"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:green fg:base"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:green fg:base"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = ""
style = "bg:green fg:base"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = ""
style = "bg:green fg:base"
format = '[ $symbol ($version) ]($style)'

[line_break]
disabled = false
